# ------------------------------------------------------------------------------
# MongoDB Client Library (libmongoc-1.0.so) — LockOrder False Positive
# ------------------------------------------------------------------------------
# Error: "Thread #1: lock order 0x94CE188 before 0x949EE98 violated"
#
# Root Cause — heap address reuse (same class of false positive as
# scylladb_cassession_deleter_lockorder_heap_reuse and
# scylladb_connection_close_nothrow_lockorder_heap_reuse):
#
#   Two completely different mutex objects share the same heap address at
#   different points in the test execution:
#
#   PHASE 1 — canConnectToMongoDB() at test line 42 (pre-test connectivity check):
#     - MongoDBDriver is created via make_shared<MongoDBDriver>(). Its internal
#       std::recursive_mutex (m_mutex) lands at heap address 0x949EE98 (Lock B).
#     - connectDocument() locks Lock B at driver_01.cpp:87.
#     - Inside, MongoDBConnection::MongoDBConnection() (connection_01.cpp:162)
#       calls mongoc_client_new_from_uri() → mongoc_topology_new() allocates a
#       topology struct (464 bytes via bson_malloc0/calloc). The topology's
#       internal pthread_mutex lands at address 0x94CE188 (Lock A), 200 bytes
#       into that block.
#     - mongoc_database_command_simple() triggers a blocking scan internally:
#       mc_tpld_modify_begin() locks Lock A (topology_mutex) while Lock B
#       (driver_mutex) is still held.
#     - Order registered by Helgrind: B → A  (driver_mutex → topology_mutex).
#     - canConnectToMongoDB() returns. Both objects destroyed via RAII.
#       Addresses 0x949EE98 and 0x94CE188 return to the glibc heap allocator.
#
#   PHASE 2 — Pool tests starting at test line 91:
#     - DocumentDBConnectionPool::getDocumentDBConnection() acquires its own
#       m_mutex (std::mutex) via unique_lock at document_db_connection_pool.cpp:433.
#       The glibc allocator places this NEW mutex at the now-free address 0x94CE188.
#     - Helgrind records "Lock A first observed" here with std::mutex::lock() —
#       but this is a completely different object reusing the same address.
#     - Inside the locked section, the pool calls createPooledDBConnection()
#       → createDBConnection() → DriverManager::getDBConnection()
#       → MongoDBDriver::connectDocument() which locks 0x949EE98 (Lock B).
#     - New order observed: A → B  (pool_mutex → driver_mutex).
#     - Helgrind sees A→B, but remembers B→A from Phase 1. Both share the
#       address 0x94CE188 but are COMPLETELY DIFFERENT objects. Violation reported.
#
# Definitive Proof — "unallocated block" in final ERROR SUMMARY:
#   Helgrind's final summary reports:
#     "Address 0x94ce188 is 58,776 bytes inside an unallocated block
#      of size 106,736 in arena 'client'"
#     "Address 0x949ee98 is 2,216 bytes inside an unallocated block
#      of size 2,960 in arena 'client'"
#   At end-of-test both addresses are in FREED memory. The objects were
#   correctly destroyed via RAII. "unallocated block" = heap address reuse
#   confirmed. This is the same diagnostic fingerprint seen in the ScyllaDB
#   false positives documented above.
#
# Why it is NOT a real bug:
#   - Thread #1 only. No concurrent threads are involved; no real race or
#     deadlock is possible from a single thread.
#   - libmongoc NEVER acquires cpp_dbc's m_mutex or driver m_mutex directly.
#     It has no knowledge of cpp_dbc objects. The apparent inversion exists
#     only because Helgrind confuses two distinct objects at the same freed
#     and reallocated heap address.
#   - The real lock order in cpp_dbc is strictly unidirectional:
#       pool_mutex → driver_mutex → [libmongoc topology mutex]
#     There is no reverse path.
#   - All 86 assertions in 25_141_test_mongodb_real_connection_pool pass.
#
# 3 unique error contexts — all share the same root cause but differ in
# which libmongoc internal call path reaches mc_tpld_modify_begin:
#   Context 1: mc_tpld_modify_begin → mongoc_topology_select_server_id
#              → [2x anonymous obj frames] → _mongoc_client_command_with_opts
