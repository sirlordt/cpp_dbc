# Issue: Lock order violation when pool validates connections using SQLite queries
# Root Cause:
#   - Forward path: Pool acquires m_mutexReturnConnection or m_mutexIdleConnections
#                   → validateConnection() → executeQuery() → m_globalFileMutex (SQLite)
#   - Helgrind detects lock order: Pool mutex → SQLite mutex
# Evidence:
#   - Exhaustive codebase search confirmed NO reverse path exists
#   - SQLite connection methods NEVER acquire m_globalFileMutex then call pool methods
#   - Investigation: Task agent searched all SQLite source files for reverse dependency
#   - Result: Zero instances found - this is a UNIDIRECTIONAL lock order
# Lock Order Pattern:
#   Thread A: m_mutexReturnConnection → validateConnection() → executeQuery() → m_globalFileMutex
#   Thread B: m_mutexIdleConnections → validateConnection() → executeQuery() → m_globalFileMutex
#   No reverse: SQLite NEVER acquires m_globalFileMutex then calls pool methods
# Functions:
#   - cpp_dbc::RelationalDBConnectionPool::returnDBConnection()
#   - cpp_dbc::RelationalDBConnectionPool::getIdleDBConnection()
#   - cpp_dbc::SQLiteDBConnection::executeQuery()
#   - validateConnection() helper
# Justification:
#   - Unidirectional lock dependency CANNOT form deadlock cycle
#   - Deadlock requires bidirectional dependency (A→B and B→A)
#   - Only forward path exists (Pool→SQLite), no reverse (SQLite→Pool)
#   - This is a FALSE POSITIVE - safe to suppress
