# ------------------------------------------------------------------------------
# Firebird POSIX Semaphore API Errors
# ------------------------------------------------------------------------------
# Issue: Helgrind reports PthAPIerror for POSIX semaphore operations (sem_timedwait,
#        sem_trywait) that fail with expected error codes (ETIMEDOUT, EAGAIN)
# Root Cause:
#   - Firebird uses POSIX semaphores (sem_timedwait, sem_trywait) for internal
#     thread synchronization in its connection management threads
#   - These semaphore calls fail with EXPECTED error codes:
#     * sem_timedwait → ETIMEDOUT (timeout expired, no signal received)
#     * sem_trywait → EAGAIN (would block, semaphore not available)
#   - Helgrind reports these as PthAPIerror even though they are NORMAL operation
# Evidence:
#   - Test log: logs/test/2026-02-15-16-25-38/23_RUN01_fail.log
#   - Thread #3 in libfbclient.so internal worker threads
#   - Stack trace shows: sem_timedwait_WRK → libfbclient.so (3 levels deep)
# Justification:
#   - These are NOT errors - they are expected return values for semaphore APIs
#   - sem_timedwait SHOULD return ETIMEDOUT when timeout expires (normal behavior)
#   - sem_trywait SHOULD return EAGAIN when semaphore is locked (non-blocking API)
#   - Firebird correctly handles these return codes in its internal logic
#   - This is Helgrind being overly strict about POSIX API return codes
# Test Prefix: 23_ (Firebird tests)
# Frequency: 2 errors per test run (suppressed in all runs)
# ------------------------------------------------------------------------------

{
   firebird_sem_timedwait_etimedout
   Helgrind:PthAPIerror
   fun:sem_timedwait_WRK
   fun:sem_timedwait@*
   obj:*/libfbclient.so*
   ...
}

{
   firebird_sem_trywait_eagain
   Helgrind:PthAPIerror
   fun:sem_trywait_WRK
   fun:sem_trywait@*
   obj:*/libfbclient.so*
   ...
}

# ------------------------------------------------------------------------------
# PostgreSQL Client Library (libpq.so)
# ------------------------------------------------------------------------------
