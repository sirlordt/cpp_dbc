# ==============================================================================
# C++ Standard Library (libstdc++) False Positives
# ==============================================================================
#
# The following suppressions target false positives in the C++ standard library
# (libstdc++) when using C++11 smart pointers (shared_ptr/weak_ptr).
#
# Analysis Date: 2026-02-15
# Helgrind Version: 3.18.1
# GCC Version: 11.x
# libstdc++ Version: GNU libstdc++ 11
#
# Root Cause:
# - libstdc++ uses atomic operations for shared_ptr/weak_ptr reference counting
# - These atomic operations use compiler intrinsics that are OPAQUE to Helgrind
# - libstdc++ HAS annotations for Helgrind but they are DISABLED by default
#
# Strategy: Suppress races in shared_ptr/weak_ptr control block operations
# ==============================================================================

# ------------------------------------------------------------------------------
# shared_ptr/weak_ptr Control Block Destruction
# ------------------------------------------------------------------------------
#
# PROBLEM:
# Helgrind reports data races when destroying weak_ptr entries in FileMutexRegistry
# during concurrent access to the same shared_ptr<recursive_mutex> control block.
#
# SCENARIO:
# - Thread A: Calls FileMutexRegistry::getMutexForFile()
#             → Finds expired weak_ptr in map
#             → Calls erase() to remove entry
#             → Destroys weak_ptr → decrements weak count in control block
#             → Locks held: m_registryMutex
#
# - Thread B: Destroys SQLiteDBConnection
#             → Destroys m_globalFileMutex (shared_ptr<recursive_mutex>)
#             → Decrements shared count in SAME control block
#             → Locks held: NONE (connection destructor)
#
# - Both threads access control block at address 0x8A69B20 concurrently
# - Helgrind sees race because it cannot see atomic synchronization
#
# STACK TRACES:
# Thread A (write to control block during erase):
#   _Sp_counted_ptr_inplace<recursive_mutex>::~_Sp_counted_ptr_inplace()
#   _Sp_counted_ptr_inplace<recursive_mutex>::_M_destroy()
#   _Sp_counted_base::_M_weak_release()  ← Decrements weak count
#   __weak_count::~__weak_count()
#   weak_ptr<recursive_mutex>::~weak_ptr()
#   pair<string, weak_ptr>::~pair()
#   Hashtable::erase()
#   FileMutexRegistry::getMutexForFile()  (file_mutex_registry.hpp:109)
#
# Thread B (read from control block during shared_ptr destruction):
#   _Sp_counted_base::_M_release()  ← Decrements shared count
#   __shared_count::~__shared_count()
#   shared_ptr<recursive_mutex>::~shared_ptr()
#   SQLiteDBConnection::~SQLiteDBConnection()  (connection_01.cpp:325)
#
# WHY THIS IS A FALSE POSITIVE - TECHNICAL JUSTIFICATION:
#
# 1. ATOMIC OPERATIONS IN LIBSTDC++:
#    File: /usr/include/c++/11/bits/shared_ptr_base.h
#    Lines 160-187: _Sp_counted_base::_M_release() implementation
#
#    Code (verified in system libstdc++):
#    ```cpp
#    void _M_release() noexcept
#    {
#        // Be race-detector-friendly.  For more info see bits/c++config.
#        _GLIBCXX_SYNCHRONIZATION_HAPPENS_BEFORE(&_M_use_count);
#        if (__gnu_cxx::__exchange_and_add_dispatch(&_M_use_count, -1) == 1)
#        {
#            _GLIBCXX_SYNCHRONIZATION_HAPPENS_AFTER(&_M_use_count);
#            _M_dispose();
#            if (_Mutex_base<_Lp>::_S_need_barriers)
#            {
#                __atomic_thread_fence(__ATOMIC_ACQ_REL);
#            }
#            _GLIBCXX_SYNCHRONIZATION_HAPPENS_BEFORE(&_M_weak_count);
#            if (__gnu_cxx::__exchange_and_add_dispatch(&_M_weak_count, -1) == 1)
#            {
#                _GLIBCXX_SYNCHRONIZATION_HAPPENS_AFTER(&_M_weak_count);
#                _M_destroy();
#            }
#        }
#    }
#    ```
#
#    - Uses __exchange_and_add_dispatch() → ATOMIC fetch-and-add operation
#    - Uses __atomic_thread_fence() → Memory barrier
#    - Lock policy = 2 (_S_atomic) → Atomic operations, NOT mutex-based
#
# 2. HELGRIND ANNOTATIONS ARE DISABLED:
#    Verification with g++ preprocessor:
#    ```bash
#    $ echo "#include <memory>" | g++ -E -dM -x c++ - | grep GLIBCXX_SYNCHRONIZATION
#    #define _GLIBCXX_SYNCHRONIZATION_HAPPENS_AFTER(A)
#    #define _GLIBCXX_SYNCHRONIZATION_HAPPENS_BEFORE(A)
#    ```
#
#    Result: Macros are EMPTY (no Helgrind annotations compiled in)
#
#    These macros SHOULD expand to Valgrind ANNOTATE_HAPPENS_BEFORE/AFTER
#    but are disabled in the system libstdc++ build. To enable them, libstdc++
#    must be compiled with specific Valgrind support flags.
#
# 3. C++ STANDARD GUARANTEES:
#    From C++17 Standard [util.smartptr.shared.atomic]:
#    "The implementation shall ensure that concurrent access to these atomic
#     shared_ptr operations is thread-safe."
#
#    From C++17 Standard [util.smartptr.weak]:
#    "The use count updates required by the copy constructor, copy assignment
#     operator, and destructor shall be performed atomically."
#
#    → Reference counting IS thread-safe by language specification
#
# 4. WHY HELGRIND REPORTS ERROR:
#    - Helgrind ONLY understands mutex-based synchronization
#    - Helgrind CANNOT track atomic operations (compiler intrinsics/assembly)
#    - Without Helgrind annotations, atomic synchronization is invisible
#    - Helgrind sees: Two threads accessing same memory → reports race
#    - Reality: Two threads using atomic ops → correctly synchronized
#
# EVIDENCE LOG:
# - Error log: logs/test/2026-02-15-00-14-04/22_RUN01_fail.log
# - Lines: 6313-6353 (Thread A - write), 6328-6352 (Thread B - read)
# - Address: 0x8A69B20 (control block of shared_ptr<recursive_mutex>)
#
# AFFECTED CODE:
# - libs/cpp_dbc/include/cpp_dbc/common/file_mutex_registry.hpp
#   → FileMutexRegistry::getMutexForFile() (lines 89-118)
#   → Properly protected by m_registryMutex (line 94)
#
# - libs/cpp_dbc/src/drivers/relational/sqlite/connection_01.cpp
#   → SQLiteDBConnection destructor (line 325)
#   → Destroys m_globalFileMutex member
#
# SAFETY:
# 1. This suppression ONLY matches:
#    - Helgrind:Race errors (not other error types)
#    - In shared_ptr/weak_ptr control block destructors
#    - Specifically _Sp_counted_ptr_inplace<recursive_mutex> type
#
# 2. Real races in cpp_dbc code would NOT match because:
#    - Application code doesn't directly manipulate control blocks
#    - Stack would include cpp_dbc namespaces and business logic
#    - This pattern only matches standard library internals
#
# 3. Scope is MINIMAL:
#    - Only affects FileMutexRegistry's weak_ptr<recursive_mutex> map
#    - Only during concurrent connection creation/destruction
#    - Does NOT suppress races in application logic
#
# ALTERNATIVES CONSIDERED:
# 1. Recompile libstdc++ with Helgrind annotations → IMPRACTICAL
#    - Requires custom toolchain
#    - Affects entire system
#    - Not viable for production or CI/CD
#
# 2. Use ThreadSanitizer instead of Helgrind → FUTURE OPTION
#    - TSan CAN track atomic operations
#    - But has different limitations
#    - Requires -fsanitize=thread rebuild
#
# 3. Disable FileMutexRegistry → LOSES BENEFIT
#    - Registry eliminates 132 other false positives
#    - Trade-off: 1 known false positive vs 132 false positives
#    - This suppression is the correct choice
#
# CONCLUSION:
# This is a DOCUMENTED and JUSTIFIED false positive caused by:
# - Helgrind's inability to track atomic operations
# - System libstdc++ compiled without Helgrind annotations
# - Correct use of C++11 thread-safe smart pointers
#
# Suppressing this error is SAFE and NECESSARY for Helgrind testing.
#
# References:
# - MEMORY.md: "SQLite FileMutexRegistry: Eliminating ThreadSanitizer False Positives"
# - research/sqlite/file_mutex_registry/: Complete investigation with benchmarks
# - /usr/include/c++/11/bits/shared_ptr_base.h: libstdc++ source code
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# ScyllaDB / libcassandra: LockOrder false positive from heap address reuse
# in CassSessionDeleter → uv_loop_close during pool close()
# ------------------------------------------------------------------------------
# Error: "Thread #1: lock order 0xAAA before 0xBBB violated"
#
# Root Cause — heap address reuse:
#   Two completely different mutexes share the same heap address at different
#   points in the test:
#
#   1. Early: address 0xAAA holds a pool mutex (m_mutexAllConnections or
#      m_mutexIdleConnections). First observed in initializePool() via
#      scoped_lock<mutex,mutex>.
#
#   2. Later: the pool is destroyed, memory freed. A new ScyllaDB session
#      (SessionBase::connect()) allocates a CassSession object containing a
#      libuv internal mutex that lands at the SAME address 0xAAA.
#
#   3. Helgrind cannot distinguish between the two allocations at the same
#      address, so it thinks the pool mutex and the libuv mutex are the same
#      lock — and reports a lock order violation.
#
# Why it is NOT a real bug:
#   - The actual lock order in ALL code paths is CONSISTENT:
#     m_connMutex (acquired in executeQuery/close) → libcassandra internal mutex
#   - There is no real lock inversion possible between pool-level mutexes and
#     libcassandra's libuv mutexes, because they belong to different, non-nested
#     scopes of ownership.
#   - All 53 test assertions pass.
