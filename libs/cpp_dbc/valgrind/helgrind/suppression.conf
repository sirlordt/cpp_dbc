# ------------------------------------------------------------------------------
# ScyllaDB / libcassandra: LockOrder false positive from heap address reuse
# in ScyllaDBConnection::close(nothrow_t) → cass_session_close → SessionBase::close()
# ------------------------------------------------------------------------------
# Error: "Thread #1: lock order 0xBBB (uv_mutex) before 0xAAA (m_connMutex) violated"
#
# Root Cause — heap address reuse (same class of false positive as
# scylladb_cassession_deleter_lockorder_heap_reuse above):
#
#   1. ScyllaDBConnection::close(nothrow_t) acquires m_connMutex (Lock A) at
#      connection_02.cpp:38 via DB_DRIVER_LOCK_GUARD, then calls
#      cass_session_close() which internally acquires uv_mutex (Lock B) inside
#      datastax::internal::core::SessionBase::close(). This establishes A→B.
#
#   2. A PREVIOUS ScyllaDBConnection was destroyed earlier: its m_connMutex
#      (Lock A, at some heap address X) was freed. The allocator reused address X
#      for libcassandra's internal "client" arena (size 256 bytes).
#
#   3. libcassandra background threads hold uv_mutex (Lock B) and access that
#      "client" arena at the SAME address X. Helgrind sees B→X and conflates
#      address X with Lock A, recording B→A as the "expected" order.
#
#   4. When our new close(nothrow_t) then does A→B at address X, Helgrind flags
#      a violation of the spuriously-recorded B→A order.
#
#   Helgrind reports "2 errors from 1 context" because the same connection
#   lifecycle happens twice in the test (two connections close in sequence).
#   Both suppression blocks in the log have identical call stacks.
#
# Why it is NOT a real bug:
#   - libcassandra background threads NEVER acquire our m_connMutex directly.
#   - The B→A "order" Helgrind recorded belongs to a different, already-freed
#     object that accidentally occupied the same heap address as our m_connMutex.
#   - Helgrind tracks lock ordering by address, not by object identity.
#   - All test assertions pass. No actual deadlock is possible.
#
# Evidence:
#   - Log: logs/test/2026-02-17-21-32-27/26_RUN03_fail.log (lines 4423-4526)
#   - Test: 26_141_01_scylladb_real_connection_pool
#   - Line 4494: "Address 0x935f540 inside block size 136 alloc'd" (our m_connMutex)
#   - Line 4613: "Address 0x935f540 inside unallocated block size 256 arena 'client'"
#     → same address, two completely different allocations → confirms heap reuse
#
# Suppression uses '...' for the caller frames (same policy as
# scylladb_cassession_deleter_lockorder_heap_reuse): the false positive is
# structural and affects any caller of close(), not just the test helpers.
# Specificity comes from the exact mangled names of ScyllaDBConnection::close()
# and the complete libcassandra internal chain.
#
# Test Prefix: 26_ (ScyllaDB connection pool tests)
# ------------------------------------------------------------------------------

{
   scylladb_connection_close_nothrow_lockorder_heap_reuse
   Helgrind:LockOrder
   fun:mutex_lock_WRK
   fun:pthread_mutex_lock
   fun:uv_mutex_lock
   fun:_ZN8datastax8internal4core11SessionBase5closeEv
   fun:cass_session_close
   fun:_ZN7cpp_dbc8ScyllaDB18ScyllaDBConnection5closeESt9nothrow_t
   fun:_ZN7cpp_dbc8ScyllaDB18ScyllaDBConnection5closeEv
   ...
}

# ------------------------------------------------------------------------------
# glibc GLIBC_2.34: pthread_cond_clockwait internal signal/broadcast during wait
# ------------------------------------------------------------------------------
# Issue: Helgrind reports "pthread_cond_{signal,broadcast}: associated lock not
#        held" from INSIDE glibc's __pthread_cond_wait_common.
#
# Root Cause:
#   glibc's pthread_cond_clockwait (GLIBC_2.34) internally calls
#   pthread_cond_signal or pthread_cond_broadcast as part of its futex-based
#   "notify-on-unbind" cleanup protocol. This happens INSIDE the wait
#   operation itself (__pthread_cond_wait_common at pthread_cond_wait.c:516/599).
#   At that point glibc has temporarily released the user-level mutex (that's the
#   whole point of cond_wait), so Helgrind sees the signal/broadcast without the
#   associated lock held. But this is correct glibc behavior — the signal targets
#   internal futex waiters, not user code.
#
#   The existing helgrind-glibc2X-005 suppression covers the older
#   pthread_cond_timedwait variant and suppresses millions of similar occurrences.
#   This suppression covers the GLIBC_2.34 pthread_cond_clockwait variant.
#
# Evidence:
#   - MySQL: pthread_cond_broadcast_WRK from getRelationalDBConnection()
#   - PostgreSQL: pthread_cond_signal_WRK from getRelationalDBConnection()
#   - Firebird: pthread_cond_signal_WRK from maintenanceTask()
#   - All from inside __pthread_cond_wait_common → glibc internal
#
# Justification: 100% false positive. glibc internal signaling during CV wait.
#   All OUR notify_one()/notify_all() calls are inside m_mutexPool locks.
#
# Safety: __pthread_cond_wait_common in the stack trace guarantees this is
#   glibc-internal, not our code. Wildcard pthread_cond_*_WRK covers both
#   signal and broadcast variants.
# ------------------------------------------------------------------------------

{
   glibc_clockwait_internal_signal_broadcast
   Helgrind:Misc
   fun:pthread_cond_*_WRK
   ...
   fun:__pthread_cond_wait_common
   fun:___pthread_cond_clockwait64
   fun:pthread_cond_clockwait@@GLIBC_2.34
   ...
}

